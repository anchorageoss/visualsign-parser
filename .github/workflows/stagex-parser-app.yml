name: stagex (parser_app)

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "main"
    paths:
      - ".github/**"
      - "Makefile"
      - "images/parser_app/**"
      - "src/Cargo.toml"
      - "src/Cargo.lock"
      - "src/generated/**"
      - "src/health_check/**"
      - "src/host_primitives/**"
      - "src/metrics/**"
      - "src/visualsign/**"
      - "src/chain_parsers/**"
      - "src/parser/app/**"
  pull_request:
    paths:
      - ".github/**"
      - "Makefile"
      - "images/parser_app/**"
      - "src/Cargo.toml"
      - "src/Cargo.lock"
      - "src/generated/**"
      - "src/health_check/**"
      - "src/host_primitives/**"
      - "src/metrics/**"
      - "src/visualsign/**"
      - "src/chain_parsers/**"
      - "src/parser/app/**"
  workflow_dispatch: # Allows manual invocation

jobs:
  parser:
    name: Build parser images (parser_app)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
      packages: write
    env:
      tags: >-
        ${{ github.ref == format('refs/heads/{0}', 'main') && 'latest' || '' }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || '' }}
        ${{ github.event_name == 'push' && github.ref_name || '' }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          dockerHub: ${{ secrets.DOCKERHUB_API_KEY }}
          ghcr: ${{ secrets.GITHUB_TOKEN }}

      - name: Build parser_app
        shell: bash
        run: |
          make -j$(nproc) out/parser_app/index.json

      - name: Load artifact to Docker
        run: |
          env -C out/parser_app tar -cf - . | docker load

      - name: Upload to GHCR
        run: |
          for tag in ${tags}; do
              docker tag "anchorageoss-visualsign-parser/parser_app:latest" "ghcr.io/anchorageoss/parser_app:${tag}"
          done
          docker image push --all-tags "ghcr.io/anchorageoss/parser_app"
