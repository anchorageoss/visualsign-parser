name: stagex

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "main"
    paths:
      - ".github/**"
      - "src/**"
      - "images/**"
      - "scripts/**"
      - "Makefile"
  pull_request:
    types: [labeled]
  workflow_dispatch: # Allows manual invocation

jobs:
  parser:
    name: Build ${{ matrix.target.label || matrix.target.name }}
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'stagex'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
      packages: write
    env:
      # release.yml dispatches stagex via `gh workflow run --ref $TAG`, which
      # arrives as `workflow_dispatch` (not `push`). Emit `ref_name` for any
      # `workflow_dispatch` so both tag dispatches (release flow) and branch
      # dispatches (manual testing on a branch) produce a real tag. Without
      # this, `docker push --all-tags` runs against an empty tag list and
      # silently publishes nothing.
      tags: >-
        ${{ github.ref == format('refs/heads/{0}', 'main') && 'latest' || '' }}
        ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || '' }}
        ${{ github.event_name == 'push' && github.ref_name || '' }}
        ${{ github.event_name == 'workflow_dispatch' && github.ref_name || '' }}
    strategy:
      matrix:
        target:
          - name: parser_app
          - name: parser_cli
            label: "parser_cli (Solana)"
          - name: parser_gateway
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history so auto-version.sh can compute commit heights and
          # merge-bases for non-tag builds (latest, pr-*).
          fetch-depth: 0
      - name: Docker setup
        uses: ./.github/actions/docker-setup
        with:
          dockerHub: ${{ secrets.DOCKERHUB_API_KEY }}

      - name: Build ${{ matrix.target.name }}
        id: build
        shell: bash
        env:
          GH_REF_TYPE: ${{ github.ref_type }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GH_REF_TYPE" == "tag" && "$GH_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="${GH_REF_NAME#v}"
          else
            # Compute on the runner: auto-version.sh isn't COPY'd into the
            # Docker build context, so the in-container build.rs would fall
            # back to "dev" and silently lose the git-derived version on
            # latest/pr-* images.
            VERSION=$(scripts/auto-version.sh)
          fi
          # Strip "+branch-hash" build metadata to get a canonical semver tag
          # that we can both publish to GHCR and reference in the TVC summary.
          # Validate the shape so a malformed VERSION fails the build instead
          # of silently producing an invalid tag like ":v".
          SEMVER="${VERSION%%+*}"
          if [[ ! "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: auto-version produced non-semver '$SEMVER' from '$VERSION'" >&2
            exit 1
          fi
          echo "semver_tag=v$SEMVER" >> "$GITHUB_OUTPUT"
          make VERSION="$VERSION" -j$(nproc) out/${{ matrix.target.name }}/index.json

      - name: Load artifact to Docker
        run: |
          env -C out/${{ matrix.target.name }} tar -cf - . | docker load

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Upload to GHCR
        env:
          SEMVER_TAG: ${{ steps.build.outputs.semver_tag }}
        run: |
          # Publish the canonical `v<semver>` tag alongside event-derived tags
          # (latest, pr-*, ref_name) so push-triggered main builds also get a
          # reproducible, version-identifying reference, not just `:latest`.
          for tag in ${tags} "${SEMVER_TAG}"; do
              docker tag "anchorageoss-visualsign-parser/${{ matrix.target.name }}:latest" "ghcr.io/anchorageoss/${{ matrix.target.name }}:${tag}"
          done
          docker image push --all-tags "ghcr.io/anchorageoss/${{ matrix.target.name }}"

      - name: TVC deployment details
        if: matrix.target.name == 'parser_app'
        shell: bash
        env:
          SEMVER_TAG: ${{ steps.build.outputs.semver_tag }}
        run: |
          # Reference the canonical `v<semver>` tag (not `first_tag`, which
          # depends on the trigger event: `latest` on main pushes, `v0.<N>.0`
          # only on release-dispatched workflow_dispatch).
          container_url="ghcr.io/anchorageoss/parser_app:${SEMVER_TAG}"
          container_digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${container_url}" | cut -d '@' -f 2)
          docker create --name tmp-extract "${container_url}" /bin/true
          docker cp tmp-extract:/parser_app /tmp/binary
          docker rm tmp-extract
          digest=$(sha256sum /tmp/binary | awk '{print $1}')
          pinned_url="${container_url}@${container_digest}"
          # Hardcoded: TVC currently only supports this QOS version.
          qos_version="v2026.2.6"

          {
            echo "## TVC Deployment Details"
            echo ""
            echo "- **Container Image URL**: \`${pinned_url}\`"
            echo "- **Executable path**: \`/parser_app\`"
            echo "- **Expected Executable Digest**: \`sha256:${digest}\`"
            echo "- **QOS Version**: \`${qos_version}\`"
            echo ""
            echo "### Verify the executable digest"
            echo ""
            echo '```bash'
            echo "export CONTAINER_URL=\"${pinned_url}\""
            echo 'cid=$(docker create "$CONTAINER_URL" /bin/true)'
            echo 'docker cp "$cid:/parser_app" /tmp/binary'
            echo 'docker rm "$cid"'
            echo 'sha256sum /tmp/binary'
            echo '```'
            echo ""
            echo "### Kick off deployment with \`tvc\`"
            echo ""
            echo "Generate a config template, paste these values into the matching keys, then create the deployment. \`appId\` and any pull-secret fields are environment-specific and must be filled in by the operator."
            echo ""
            echo '```bash'
            echo 'tvc deploy init -o tvc-deploy.json'
            echo '# Edit tvc-deploy.json to set:'
            echo "#   \"pivotContainerImageUrl\": \"${pinned_url}\""
            echo '#   "pivotPath": "/parser_app"'
            echo "#   \"expectedPivotDigest\": \"sha256:${digest}\""
            echo "#   \"qosVersion\": \"${qos_version}\""
            echo '#   "appId": "<env-specific>"'
            echo 'tvc deploy create tvc-deploy.json'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
